<section id="about" class="section">
  <div class="container">
    <div class="about-content">

      <!-- Left: text -->
      <div class="left-col">
        <div class="text-block">
          <p class="greeting">Hi, my name is</p>
          <h1 class="name">{{ about.name }}</h1>
          <h2 class="tagline">{{ about.tagline }}</h2>
          <p class="bio">{{ about.bio }}</p>
          <a href="#contact" class="cta-btn" (click)="scrollToContact($event)">
            Get In Touch
          </a>
        </div>
      </div>

      <!-- Right: YouTube demo video + profile pic below -->
      <div class="video-block">
        <p class="video-label">Project Demo</p>
        <div class="video-frame">
          <iframe
            [src]="safeVideoUrl"
            frameborder="0"
            allow="encrypted-media; picture-in-picture"
            allowfullscreen
            title="Project Demo Video">
          </iframe>
        </div>
        <div class="avatar-block">
          <div class="avatar-ring">
            <div class="avatar-initials">SB</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
